services:
  db:
    image: postgres:16-alpine
    container_name: bwms-db
    environment:
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
      POSTGRES_DB: workflow
    ports:
      # Host 5433 avoids conflict when another PostgreSQL already uses 5432.
      - "5433:5432"
    volumes:
      - bwms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: bwms-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://workflow:workflow@db:5432/workflow
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "480"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:5174","http://127.0.0.1:5173","http://127.0.0.1:5174","http://localhost:3000"]'
      ENVIRONMENT: development
    ports:
      # Host 8001 if another process already uses 8000.
      - "8001:8000"
    volumes:
      - ./backend:/app
    # Mounted Windows checkout can use CRLF; strip CR before running entrypoint.
    command:
      - sh
      - -c
      - >-
        sed -i 's/\r$$//' /app/scripts/entrypoint.sh 2>/dev/null || true;
        exec sh /app/scripts/entrypoint.sh

  frontend:
    build:
      context: ./frontend
    container_name: bwms-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8001
      VITE_USE_POLLING: "true"
      # Browser hits host port 5174; HMR WebSocket must use the same (see vite.config.ts).
      VITE_HMR_CLIENT_PORT: "5174"
    ports:
      # Host 5174 if another Vite app already uses 5173.
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  bwms_pgdata:
