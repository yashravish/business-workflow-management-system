services:
  db:
    image: postgres:16-alpine
    container_name: bwms-db
    environment:
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
      POSTGRES_DB: workflow
    ports:
      - "5432:5432"
    volumes:
      - bwms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: bwms-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://workflow:workflow@db:5432/workflow
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "480"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["/app/scripts/entrypoint.sh"]

  frontend:
    build:
      context: ./frontend
    container_name: bwms-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  bwms_pgdata:
