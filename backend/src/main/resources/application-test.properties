spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Flyway is disabled in tests; Hibernate creates schema via ddl-auto=create-drop
spring.flyway.enabled=false

# Test JWT secret — long enough to satisfy JJWT 0.12.x 256-bit minimum
app.jwt-secret-key=test-secret-key-that-is-long-enough-for-hs256
app.jwt-expire-minutes=480
app.cors-origins=http://localhost:5173
