spring.application.name=bwms

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:workflow}?stringtype=unspecified
spring.datasource.username=${DB_USER:workflow}
spring.datasource.password=${DB_PASSWORD:workflow}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.property-naming-strategy=SNAKE_CASE

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT — secret must be at least 32 bytes (256 bits) for HS256
app.jwt-secret-key=${APP_SECRET_KEY:change-me-in-production-use-min-32-chars}
app.jwt-algorithm=HS256
app.jwt-expire-minutes=480

app.cors-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

logging.level.com.example.bwms=INFO
